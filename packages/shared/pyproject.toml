[project]
name = "rag-shared"
version = "0.0.0"
description = "Shared utilities: env, supabase client, types"
requires-python = ">=3.12"
dependencies = [
  "supabase>=2.10.0",
  "pydantic>=2.10.0",
  "pydantic-settings>=2.6.0",
  "psycopg[binary,pool]>=3.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rag_shared"]
